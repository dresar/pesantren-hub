    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <meta name="theme-color" content="#0f766e" />
    
    <style>
      /* Initial Loading Style (Critical Path CSS) */
      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #ffffff;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e2e8f0;
        border-top-color: #0f766e; /* Primary color */
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .loader-text {
        margin-top: 16px;
        font-size: 14px;
        color: #64748b;
        font-weight: 500;
        letter-spacing: 0.5px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @media (prefers-color-scheme: dark) {
        #initial-loader { background-color: #020617; }
        .spinner { border-color: #1e293b; border-top-color: #2dd4bf; }
        .loader-text { color: #94a3b8; }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="spinner"></div>
        <div class="loader-text">Memuat Sistem...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
